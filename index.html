<!DOCTYPE html>

<style>
  :root{
    --bg:#ffffff;--ink:#0a0a0a;--red:#ec3b27;
    --accent:#00DD58;  /* プロフィール/✕印/作品見出しの基調色 accent_color / 基調色 */
    --fs:15px;
    /* === 字詰め・行間・ウェイト（スプレッドシートで上書き可能 / イラレ感覚の数値）=== */
    /* 行間（行送り％：150 = 1.5倍）をセクション別に */
    --lh:1.5;          /* 全体        line_height         / 行間 */
    --title-lh:1.05;   /* 作品タイトル  title_line_height   / タイトル行間 */
    --credit-lh:1.55;  /* クレジット    credit_line_height  / クレジット行間 */
    --profile-lh:1.95; /* プロフィール本文 profile_line_height / プロフィール行間 */
    --desc-lh:1.95;    /* 作品説明文    desc_line_height    / 説明行間 */
    /* 字詰め（トラッキング 1/1000em：50 = 0.05em）をセクション別に */
    --ls:.01em;        /* 全体        letter_spacing       / 字詰め */
    --title-ls:0;      /* 作品タイトル  title_letter_spacing  / タイトル字詰め */
    --credit-ls:.02em; /* クレジット    credit_letter_spacing / クレジット字詰め */
    --profile-ls:.01em;/* プロフィール  profile_letter_spacing/ プロフィール字詰め */
    --desc-ls:.01em;   /* 作品説明文    desc_letter_spacing   / 説明字詰め */
    --label-ls:.01em;  /* 年/カテゴリ   label_letter_spacing  / ラベル字詰め */
    --label-gap:8px;   /* 年/カテゴリのサムネ端からの距離 label_gap / ラベル距離（px）*/
    /* ウェイト（font-weight）をセクション別に */
    --title-w:700;     /* 作品タイトル  title_weight   / タイトルウェイト */
    --credit-w:400;    /* クレジット    credit_weight  / クレジットウェイト */
    --profile-w:400;   /* プロフィール本文 profile_weight / プロフィールウェイト */
    --desc-w:400;      /* 作品説明文    desc_weight    / 説明ウェイト */
    --label-w:400;     /* 年/カテゴリ   label_weight   / ラベルウェイト */
    --sans:"Helvetica Neue",Arial,"Yu Gothic",YuGothic,"游ゴシック体","游ゴシック","Hiragino Kaku Gothic ProN",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  button{-webkit-tap-highlight-color:transparent;outline:none;}
  html,body{background:var(--bg);color:var(--ink);overflow-x:hidden;}
  body{font-family:var(--sans);font-size:var(--fs);line-height:var(--lh);-webkit-font-smoothing:antialiased;letter-spacing:var(--ls);}
  a{color:inherit;text-decoration:none;}

  header{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
    padding:30px 30px;z-index:60;pointer-events:none;mix-blend-mode:difference;color:#fff;}
  header div{font-size:var(--fs);}
  header .center{position:absolute;left:50%;top:30px;transform:translateX(-50%);pointer-events:auto;cursor:pointer;}
  header .right{margin-left:auto;pointer-events:auto;cursor:pointer;display:inline-flex;align-items:center;}
  /* アイコンはヘッダー(反転合成)の外の別レイヤー。素の色のまま点滅 */
  .favico{position:fixed;width:var(--fs);height:var(--fs);object-fit:contain;z-index:61;cursor:pointer;animation:blink 1s steps(1,end) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* archive : airy %-scatter, fixed font */
  #stage{position:relative;width:100%;max-width:1500px;margin:0 auto;aspect-ratio:1600/4600;}
  .work{position:absolute;width:19%;cursor:pointer;}
  .thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#0c0c0c;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .field{width:100%;height:100%;background:linear-gradient(160deg,#1c1c1c,#080808);}
  .thumb::after{content:"";position:absolute;inset:0;background:#000;opacity:0;transition:opacity .25s ease;}
  .work:hover .thumb::after{opacity:1;}                 /* hover = 黒 */
  .label{position:absolute;font-size:var(--fs);line-height:1;white-space:nowrap;color:var(--ink);letter-spacing:var(--label-ls);font-weight:var(--label-w);--p:50%;--ph:20%;}
  /* 上ラベルは小文字ディセンダー(p,j等)の分だけ少し持ち上げ、サムネとの視覚距離を四辺で均一化 */
  .label.e-top{padding-bottom:.16em;}
  /* サムネ端からの距離は四辺とも一定（--label-gap, px指定可）*/
  .label.e-top{bottom:calc(100% + var(--label-gap));top:auto;left:var(--p);}
  .label.e-bottom{top:calc(100% + var(--label-gap));left:var(--p);}
  .label.e-left{right:calc(100% + var(--label-gap));left:auto;top:var(--p);}
  .label.e-right{left:calc(100% + var(--label-gap));top:var(--p);}

  /* overlays */
  .overlay{position:fixed;inset:0;background:#000;z-index:100;overflow-y:auto;display:flex;opacity:0;visibility:hidden;transition:opacity .5s ease .16s,visibility .5s ease;}
  .overlay.open{opacity:1;visibility:visible;transition:opacity .4s ease,visibility .4s ease;}
  /* 開閉アニメ：カードがふわっと上下しながらフェード。閉じる時もなめらかに */
  .sheet,.p-sheet{opacity:0;transform:translateY(28px) scale(.99);
    transition:opacity .5s ease .16s,transform .55s cubic-bezier(.22,1,.36,1) .16s;}
  .overlay.open .sheet,.overlay.open .p-sheet{opacity:1;transform:none;transition:opacity .45s ease,transform .55s cubic-bezier(.22,1,.36,1);}
  /* ✕印：開くときは回りながら出現。閉じるときは先に回転し始めてからゆっくり回って消える（回転は控えめ）*/
  /* 閉じる時：その場で少し回転しつつ、今より少し早めにフェードアウト */
  .closeX{opacity:0;transform:rotate(-70deg);transition:opacity .3s ease .08s,transform .5s ease;}
  .overlay.open .closeX{opacity:1;transform:none;transition:opacity .3s ease,transform .85s ease .05s;}
  /* ✕：サイズは画面幅で可変。位置は各カードの右上角に追従（狭い画面で被らず、広い画面で離れすぎない）*/
  #detail{--cw:min(95vw,1640px);}
  #profile{--cw:min(92vw,1120px);}
  .closeX{--x:clamp(104px,9vw,200px);position:fixed;top:clamp(14px,2vw,30px);
    right:max(18px,calc((100vw - var(--cw,min(95vw,1640px)))/2 - var(--x)*0.28));
    width:var(--x);height:var(--x);z-index:130;cursor:pointer;background:none;border:0;}
  .closeX:before,.closeX:after{content:"";position:absolute;left:50%;top:50%;width:calc(var(--x)*1.26);height:calc(var(--x)*0.158);background:var(--xc,var(--accent));}
  .closeX:before{transform:translate(-50%,-50%) rotate(45deg);}
  .closeX:after{transform:translate(-50%,-50%) rotate(-45deg);}
  .closeX:hover:before,.closeX:hover:after{background:#fff;}

  /* detail : video / title+meta / credit  = 3 separate columns (intentional) */
  .sheet{background:#fff;color:#000;width:95%;max-width:1640px;margin:auto;padding:56px 60px 60px;
    display:grid;grid-template-columns:2.5fr .62fr .62fr;gap:34px 46px;align-items:start;--wc:var(--accent);}
  .d-video{grid-column:1;grid-row:1 / span 2;}
  .player{position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;}
  .player img{width:100%;height:100%;object-fit:cover;display:block;}
  .player .field{width:100%;height:100%;background:linear-gradient(160deg,#1c1c1c,#080808);}
  .player iframe{width:100%;height:100%;border:0;display:block;}
  .d-meta{grid-column:2;grid-row:1;}
  .d-meta h1{color:var(--wc);font-size:36px;font-weight:var(--title-w);line-height:var(--title-lh);letter-spacing:var(--title-ls);}
  .d-meta .sub{color:var(--wc);font-size:var(--fs);margin-top:6px;}
  .d-meta .award{color:var(--ink);font-size:var(--fs);margin-top:10px;line-height:1.5;}
  /* 絵文字は Apple のものを使う */
  .label.trophy,.tEmoji{font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;}
  /* トロフィー：作品ごとの歪んだループ(t-roam-i)に沿って一定速度で滑らかに進む */
  .label.trophy{line-height:1;white-space:normal;will-change:left,top;}
  @media (prefers-reduced-motion:reduce){.label.trophy{animation:none !important;}}
  .d-credit{grid-column:3;grid-row:1 / span 2;font-size:var(--fs);line-height:var(--credit-lh);letter-spacing:var(--credit-ls);font-weight:var(--credit-w);}
  .d-credit h2{color:var(--wc);font-weight:400;font-size:var(--fs);margin-bottom:14px;}
  .d-credit .role{color:var(--wc);margin-top:14px;}
  .d-credit .role:first-of-type{margin-top:0;}
  .d-credit .nm{color:#000;}
  .d-body{grid-column:1;grid-row:3;font-size:var(--fs);line-height:var(--desc-lh);letter-spacing:var(--desc-ls);font-weight:var(--desc-w);max-width:700px;margin-top:10px;}
  .playbtn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:82px;height:82px;border:0;border-radius:50%;background:var(--wc,var(--red));cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s ease;}
  .playbtn:hover{transform:translate(-50%,-50%) scale(1.08);}
  .playbtn:after{content:"";border-left:26px solid #fff;border-top:16px solid transparent;border-bottom:16px solid transparent;margin-left:6px;}

  /* profile : same manner as detail (white card, 'credit'-style colored lowercase headers) */
  .p-sheet{background:#fff;color:#000;width:92%;max-width:1120px;margin:auto;padding:60px 64px 80px;letter-spacing:var(--profile-ls);--wc:var(--accent);}
  .p-name{color:var(--wc);font-size:40px;font-weight:700;letter-spacing:0;line-height:1.05;}
  .p-role{color:var(--wc);font-size:var(--fs);margin-top:6px;}
  .p-grid{display:grid;grid-template-columns:1.5fr .7fr;gap:56px;margin-top:48px;align-items:start;}
  .p-main{min-width:0;}                                  /* グリッド内のはみ出し防止 */
  .p-main section{margin-bottom:34px;}
  .p-main h3{color:var(--wc);font-size:var(--fs);font-weight:400;margin-bottom:14px;}
  .p-main p{font-size:var(--fs);line-height:var(--profile-lh);font-weight:var(--profile-w);max-width:620px;overflow-wrap:break-word;}
  /* career / awards / skills：日付列＋内容列の2カラムグリッドで左右を揃える */
  /* row-gap は使わず行間(profile_line_height)で項目間隔を決める → セクション全体に効く */
  .p-list{display:grid;grid-template-columns:max-content 1fr;column-gap:18px;row-gap:0;font-size:var(--fs);line-height:var(--profile-lh);}
  .p-list dt{white-space:nowrap;color:#000;}
  .p-list dd{min-width:0;overflow-wrap:anywhere;}
  .p-list dd.full{grid-column:1/-1;}   /* 日付なし行は行頭(1列目左端)から */
  /* contact：横並び。下線=リンクが分かるよう維持 */
  .p-row{display:flex;gap:18px;font-size:var(--fs);line-height:var(--profile-lh);}
  .p-row span,.p-row a{min-width:0;overflow-wrap:anywhere;} /* 長文・長URLを折り返して右にはみ出さない */
  .p-row .k{min-width:92px;flex-shrink:0;}
  .p-contact .p-row .k{min-width:150px;}
  .p-main a{border-bottom:1px solid #000;}
  .p-photo .ph{width:100%;aspect-ratio:3/4;background:linear-gradient(160deg,#1c1c1c,#080808) center/cover no-repeat;}

  @media (max-width:760px){
    /* スマホ：タイトルは左、プロフィールは右で一段下げる */
    /* タイトルとプロフィールの上端を揃え、両方を少しだけ下げる */
    header{align-items:flex-start;padding:16px 18px;}
    header .center{position:static;left:auto;top:auto;transform:none;max-width:58%;}
    header .right{margin-left:auto;margin-top:0;}
    #stage{aspect-ratio:auto;max-width:none;padding:132px 20px 90px;}
    /* サムネはランダムに散らす（縦一列にしない）。端から端まで大きく振る */
    /* 横位置(margin-left)はJSで毎回ランダムに付与（サイドのラベル分の余白は確保済み）*/
    .work{position:relative !important;left:auto !important;top:auto !important;width:54% !important;margin-top:0 !important;margin-right:0 !important;margin-bottom:108px !important;}
    /* 上下ラベルは1行のまま（重なり防止）。横ラベルだけ収まらない時に折り返す */
    .label.e-left,.label.e-right{white-space:normal;max-width:22vw;}
    /* スマホ：visibilityを使わず、オーバーレイは常時表示・透明・クリック透過。
       カードは閉じ位置(画面下)に常駐し、transform だけでスライド開閉（即時非表示が起きない）*/
    /* 閉じ/閉じ中は透明(ホームが見える)、開いている間は白で全面カバー(ホームを隠す) */
    .overlay{background:transparent !important;opacity:1 !important;visibility:visible !important;pointer-events:none;display:block !important;transition:none !important;}
    .overlay.open{background:#fff !important;pointer-events:auto;}
    /* 閉じ：✕の回転を先に見せるため少し遅らせ、ゆっくりスライドダウン＋後半でフェードアウト */
    .sheet,.p-sheet{margin:0;width:100%;max-width:none;min-height:100vh;min-height:100dvh;
      opacity:0;transform:translateY(100vh);
      transition:transform 1s cubic-bezier(.4,0,.2,1) .16s, opacity 1s ease .16s !important;}
    /* 開く：遅延なしでスッと上がる（不透明はすぐ） */
    .overlay.open .sheet,.overlay.open .p-sheet{opacity:1 !important;transform:none !important;
      transition:transform .72s cubic-bezier(.32,.72,0,1), opacity .28s ease !important;}
    /* スマホでは✕ホバーで白くしない（タッチで張り付くため）*/
    .closeX:hover:before,.closeX:hover:after{background:var(--xc,var(--accent));}
    .closeX{top:14px;right:16px;width:104px;height:104px;}
    .closeX:before,.closeX:after{width:132px;height:20px;}
    .sheet{grid-template-columns:1fr;padding:26px 20px 46px;gap:18px;}
    .d-video,.d-meta,.d-credit,.d-body{grid-column:1 !important;grid-row:auto !important;}
    .d-meta h1{font-size:28px;}
    .p-sheet{padding:34px 22px 56px;}
    .p-name{font-size:30px;}
    .p-grid{grid-template-columns:1fr;gap:32px;margin-top:34px;}
    .p-photo{order:-1;max-width:260px;}
    /* コンタクト：横並びのまま詰めて、リンク(下線)が区切り線と紛れないようにする */
    .p-contact .p-row .k{min-width:84px;}
    .p-row{gap:12px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>

/* トロフィー：作品ごとに「歪んだ閉ループ」を生成し、それに沿って一定速度で滑らかに進む（揺れない）。
   円ではなく各々違う形なので色々な方向へ動き、端でふわっと折り返す。 */
const rnd=(a,b)=>+(a+Math.random()*(b-a)).toFixed(1);
const trophy=layout.map((_,idx)=>{
  const N=14;                                  /* 頂点を増やして滑らかな円軌道に（跳ね返り感を消す）*/
  const start=Math.random()*Math.PI*2;
  const dir=Math.random()<.5?1:-1;             /* 回る向き */
  const rx=rnd(54,74), ry=rnd(60,84);          /* ループ半径(%) 少し外側へ */
  const wob=rnd(0.06,0.16), wph=Math.random()*Math.PI*2, wn=2+Math.floor(Math.random()*2); /* ゆるい楕円のうねり */
  const pts=[];
  for(let k=0;k<N;k++){
    const ang=start+dir*(k/N)*Math.PI*2;
    const m=1+wob*Math.sin(wn*ang+wph);        /* なだらかに半径を変化（カクつかない）*/
    pts.push([ +(50+Math.cos(ang)*rx*m).toFixed(1), +(50+Math.sin(ang)*ry*m).toFixed(1) ]);
  }
  return {pts, dur:rnd(3.5,6), delay:rnd(-6,0)};  /* 一定速度・位相ばらし */
});
/* 上で作った各ループを @keyframes として注入 */
(function injectTrophyKeyframes(){
  let css="";
  trophy.forEach((T,i)=>{
    let frames="";
    for(let k=0;k<=T.pts.length;k++){
      const p=T.pts[k%T.pts.length];
      frames+=`${(k/T.pts.length*100).toFixed(1)}%{left:${p[0]}%;top:${p[1]}%;}`;
    }
    css+=`@keyframes t-roam-${i}{${frames}}`;
  });
  const s=document.createElement("style");s.textContent=css;document.head.appendChild(s);
})();

/* ===== CSV ===== */
function parseCSV(t){const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<t.length;i++){const c=t[i];
    if(q){if(c==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cur);cur="";}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c!=='\r')cur+=c;}}
  if(cur!==""||row.length){row.push(cur);rows.push(row);}return rows;}

async function loadTab(name){
  try{
    const r=await fetch(tabCSV(name),{cache:"no-store"});
    if(!r.ok)return {};
    let text=await r.text();
    text=text.replace(/^﻿/,""); /* 先頭セルの BOM を除去（最初のキーが反応しない原因）*/
    const rows=parseCSV(text);const m={};
    rows.forEach(row=>{
      let k=(row[0]||"").trim();const v=(row[1]||"").trim();
      if(KEY_ALIASES[k])k=KEY_ALIASES[k]; /* 日本語キーを正規キーへ */
      if(k&&v)m[k]=v;});
    return m;
  }catch(e){return {};}
}
/* 複数タブを読み込んで結合（後ろのタブが優先）*/
async function loadSheet(){
  const maps=await Promise.all(SHEET_TABS.map(loadTab));
  return Object.assign({},...maps);
}

/* ===== helpers ===== */
function ytId(s){if(!s)return DEMO_VIDEO;const m=s.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{6,})/);return m?m[1]:s.trim();}
/* Google Drive 等の共有リンクを <img> で表示できる直リンクへ変換 */
function imgURL(s){
  if(!s)return "";
  s=s.trim();
  const m=s.match(/\/d\/([\w-]+)/)||s.match(/[?&]id=([\w-]+)/);
  if(m)return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w2000`;
  return s;
}
/* イラレ感覚の数値を CSS 値へ変換 */
function toLS(v){ /* 字詰め：トラッキング 1/1000em（50→0.05em）。単位付きはそのまま */
  v=(v+"").trim(); if(v==="")return "0";
  if(/[a-z%]/i.test(v))return v;
  const n=parseFloat(v); return isNaN(n)?"0":(n/1000)+"em";
}
function toLH(v){ /* 行間：行送り％（150→1.5）。1.5 のような倍率もそのまま受ける */
  v=(v+"").trim(); if(v==="")return "normal";
  if(v.endsWith("%"))return (parseFloat(v)/100)||"normal";
  const n=parseFloat(v); if(isNaN(n))return v;
  return n>=10 ? n/100 : n;
}
function toPX(v){ /* 数値だけなら px を補う。単位付きはそのまま */
  v=(v+"").trim(); if(v==="")return "0";
  return /[a-z%]/i.test(v)?v:v+"px";
}
function creditHTML(txt){
  return txt.split("\n").map(l=>{l=l.trim();if(!l)return "";
    return l.endsWith("/")?`<div class="role">${l}</div>`:`<div class="nm">${l}</div>`;}).join("");
}

/* 散らばりはそのまま、作品帯を左右中央に揃える（左右余白を均等化）＋もう少し右へ */
const WORK_W=19;
const X_SHIFT=((100-Math.max(...layout.map(L=>L.x+WORK_W)))-Math.min(...layout.map(L=>L.x)))/2 + 4;

/* 年・カテゴリのラベル位置を毎回ランダムに。年とカテゴリは別の辺に置き、
   画面端の作品では外側の辺(left/right)を避けて見切れを防ぐ */
const labelCfg=layout.map(L=>{
  const left=L.x+X_SHIFT;
  let allow=["top","bottom","left","right"];
  if(left<14) allow=allow.filter(e=>e!=="left");
  if(left+WORK_W>86) allow=allow.filter(e=>e!=="right");
  const pk=()=>allow[Math.floor(Math.random()*allow.length)];
  const e1=pk(); let e2; do{e2=pk();}while(e2===e1);
  const pp=()=>+(18+Math.random()*52).toFixed(0);   /* 辺上の位置 18〜70% */
  return {yr:{e:e1,p:pp()}, ca:{e:e2,p:pp()}};
});

/* スマホ用：毎回ランダムな横位置(margin-left%)。サイドにラベルが付く作品はその側に余白を確保し、画面外に出ないようにする */
const MWORK_W=54;                 /* スマホの作品幅(%) CSSと一致させる */
const M_SIDE=16;                  /* 左右ラベルに要る余白(%) */
const mobileX=labelCfg.map(c=>{
  let lo=2, hi=100-MWORK_W-2;     /* 既定 2%〜44% */
  if(c.yr.e==="left"||c.ca.e==="left")   lo=Math.max(lo,M_SIDE);
  if(c.yr.e==="right"||c.ca.e==="right") hi=Math.min(hi,100-MWORK_W-M_SIDE);
  return +(lo+Math.random()*(hi-lo)).toFixed(1);
});

function buildArchive(){
  const stage=document.getElementById("stage");stage.innerHTML="";
  const tSpeed=parseFloat(g("trophy_speed"))||1;   /* 大きいほど速い */
  layout.forEach((L,i)=>{
    const n=i+1,col=colors[i];
    const thumb=imgURL(g(`work${n}_thumb`));
    const el=document.createElement("div");el.className="work";
    el.style.left=(L.x+X_SHIFT)+"%";el.style.top=L.top+"%";
    el.style.marginLeft=mobileX[i]+"%";   /* スマホ時のランダム横位置（PCはabsoluteなので無視される）*/
    const inner=thumb?`<img src="${thumb}" alt="">`:`<div class="field"></div>`;
    const trophyHTML=g(`work${n}_award`)
      ?`<span class="label trophy" style="animation:t-roam-${i} ${(trophy[i].dur/tSpeed).toFixed(2)}s linear infinite;animation-delay:${(trophy[i].delay/tSpeed).toFixed(2)}s" title="${g(`work${n}_award`)}">🏆</span>`
      :"";
    const lc=labelCfg[i];
    el.innerHTML=`<div class="thumb">${inner}</div>`+
      `<span class="label year e-${lc.yr.e}" style="--p:${lc.yr.p}%;--ph:${lc.yr.p}%">${g(`work${n}_year`)}</span>`+
      `<span class="label cat e-${lc.ca.e}" style="--p:${lc.ca.p}%;--ph:${lc.ca.p}%">${g(`work${n}_category`)}</span>`+
      trophyHTML;
      el.addEventListener("click",()=>openDetail(n,col));
    stage.appendChild(el);
  });
}
function buildHeaderProfile(){
  document.getElementById("hTitle").textContent=g("site_title");
  document.getElementById("hProfileText").textContent=g("profile_label");
  placeFavico();

    document.getElementById("ogImage").content=sImg;
    document.getElementById("twImage").content=sImg;
    document.getElementById("favicon").href=sImg;
  }
  /* 1行=1項目。先頭が日付(数字始まり)ならそれを左列、残りを右列に。区切りは半角/全角スペース・タブのいずれでもOK */
  const rows=s=>{
    const items=s.split("\n").filter(x=>x.trim()).map(line=>{
      line=line.trim();

      if(m){const body=m[2].replace(/[\s　]+/g," ").trim();

      return `<dd class="full">${line}</dd>`; /* 日付なしは2列ぶち抜きで行頭から */
    }).join("");
    return `<div class="p-list">${items}</div>`;
  };

         <section><h3>awards &amp; screenings</h3>${rows(g("profile_awards"))}</section>

         <section class="p-contact"><h3>contact</h3>
           <div class="p-row"><span class="k">mail</span><a href="mailto:${g("profile_mail")}">${g("profile_mail")}</a></div>
           <div class="p-row"><span class="k">instagram</span><a href="${g("profile_instagram")}" target="_blank" rel="noopener">${g("profile_instagram").replace(/^https?:\/\/(www\.)?/,"")}</a></div>
           <div class="p-row"><span class="k">youtube</span><a href="${g("profile_youtube")}" target="_blank" rel="noopener">${g("profile_youtube").replace(/^https?:\/\/(www\.)?/,"")}</a></div>
         </section>
       </div>
       <div class="p-photo"><div class="ph" ${photo?`style="background-image:url('${photo}')"`:""}></div></div>

/* 点滅アイコンを「profile here」テキストの直前に配置（小文字に合わせ少し下げる）*/
function placeFavico(){
  const t=document.getElementById("hProfileText"),ic=document.getElementById("favicoTop");
  if(!t||!ic)return;
  const r=t.getBoundingClientRect();
  ic.style.top=(r.top+r.height*0.5-ic.offsetHeight/2+2)+"px";
  ic.style.left=(r.left-ic.offsetWidth-7)+"px";
}
window.addEventListener("resize",placeFavico);
window.addEventListener("load",placeFavico);
function show(n){n.classList.add("open");n.setAttribute("aria-hidden","false");n.scrollTop=0;document.body.style.overflow="hidden";placeCloseX();}
/* ✕をカードの右上角に合わせる（広い画面=中央寄りのカード角へ、背の高い内容=上端付近へ）。
   スマホは固定配置のままにするため何もしない（CSSに任せる）。*/
function placeCloseX(){
  const mobile=window.innerWidth<=760;
  document.querySelectorAll(".overlay").forEach(ov=>{
    const x=ov.querySelector(".closeX");if(!x)return;
    if(mobile||!ov.classList.contains("open")){x.style.top=x.style.left=x.style.right="";return;}
    const card=ov.querySelector(".sheet,.p-sheet");if(!card)return;
    const xw=x.offsetWidth;
    const cardTop=card.offsetTop-ov.scrollTop;                 /* transformの影響を受けない実位置 */
    const cardRight=card.offsetLeft+card.offsetWidth;
    x.style.top=Math.max(14,cardTop-xw*0.30)+"px";
    x.style.left=Math.min(window.innerWidth-xw,cardRight-xw*0.72)+"px";
    x.style.right="auto";
  });
}
window.addEventListener("resize",placeCloseX);
function closeAll(){
  document.querySelectorAll(".overlay").forEach(o=>{o.classList.remove("open");o.setAttribute("aria-hidden","true");});
  document.getElementById("player").innerHTML="";document.body.style.overflow="";
  setState("");
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeAll();});

/* ===== 状態保持：URLハッシュに現在の表示を記録し、再読み込みで復元 ===== */
function setState(h){history.replaceState(null,"",h||location.pathname+location.search);}
function restoreState(){
  const h=location.hash;
  if(h==="#profile"){openProfile();return;}
  const m=h.match(/^#work-(\d+)$/);
  if(m){const n=+m[1];if(n>=1&&n<=layout.length)openDetail(n,colors[n-1]);}
}

/* ===== design : 字詰め・行間をスプレッドシート値で反映 ===== */
function applyDesign(){
  const r=document.documentElement.style;
  const lh=(v,k)=>r.setProperty(v,toLH(g(k)));
  const ls=(v,k)=>r.setProperty(v,toLS(g(k)));
  /* 行間（行送り％）*/
  lh("--lh",        "line_height");
  lh("--title-lh",  "title_line_height");
  lh("--credit-lh", "credit_line_height");
  lh("--profile-lh","profile_line_height");
  lh("--desc-lh",   "desc_line_height");
  /* 字詰め（トラッキング 1/1000em）*/
  ls("--ls",        "letter_spacing");
  ls("--title-ls",  "title_letter_spacing");
  ls("--credit-ls", "credit_letter_spacing");
  ls("--profile-ls","profile_letter_spacing");
  ls("--desc-ls",   "desc_letter_spacing");
  ls("--label-ls",  "label_letter_spacing");
  /* ラベル距離（px）*/
  r.setProperty("--label-gap",toPX(g("label_gap")));
  /* 色 */
  r.setProperty("--bg",    g("bg_color"));
  r.setProperty("--ink",   g("text_color"));
  r.setProperty("--accent",g("accent_color"));
  /* ウェイト */
  r.setProperty("--title-w",  g("title_weight"));
  r.setProperty("--credit-w", g("credit_weight"));
  r.setProperty("--profile-w",g("profile_weight"));
  r.setProperty("--desc-w",   g("desc_weight"));
  r.setProperty("--label-w",  g("label_weight"));
}
